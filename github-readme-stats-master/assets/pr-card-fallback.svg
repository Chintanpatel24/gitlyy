<svg width="520" height="160" viewBox="0 0 520 160" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Pull Requests Card Fallback</title>
  <desc id="desc">Static fallback image for pull request card.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#070d0d"/>
      <stop offset="100%" stop-color="#131c1c"/>
    </linearGradient>
  </defs>
  <rect x="1" y="1" width="518" height="158" rx="12" fill="url(#bg)" stroke="#ffffff" stroke-opacity="0.2"/>
  <text x="24" y="36" fill="#ffa500" font-size="22" font-family="Segoe UI, Arial, sans-serif" font-weight="700">Pull Requests</text>
  <text x="24" y="62" fill="#ffffff" font-size="14" font-family="Segoe UI, Arial, sans-serif">Fallback image is active</text>
  <text x="24" y="86" fill="#9dd4ff" font-size="13" font-family="Segoe UI, Arial, sans-serif">Use your deployed endpoint for live values:</text>
  <text x="24" y="108" fill="#ffffff" font-size="12" font-family="Segoe UI, Arial, sans-serif">/api/pull-requests?username=YOUR_USERNAME</text>
  <rect x="24" y="120" width="180" height="24" rx="6" fill="#0e3d1a"/>
  <text x="36" y="136" fill="#ffffff" font-size="12" font-family="Segoe UI, Arial, sans-serif" font-weight="600">Live PR count appears here</text>
</svg>
