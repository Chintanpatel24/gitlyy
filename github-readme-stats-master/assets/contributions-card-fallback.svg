<svg width="900" height="220" viewBox="0 0 900 220" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Contributions Card Fallback</title>
  <desc id="desc">Static fallback image for contributions card.</desc>
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#070d0d"/>
      <stop offset="100%" stop-color="#101717"/>
    </linearGradient>
  </defs>
  <rect x="1" y="1" width="898" height="218" rx="12" fill="url(#bg2)" stroke="#ffffff" stroke-opacity="0.2"/>
  <text x="24" y="36" fill="#ffa500" font-size="22" font-family="Segoe UI, Arial, sans-serif" font-weight="700">Contributions</text>
  <text x="24" y="60" fill="#ffffff" font-size="14" font-family="Segoe UI, Arial, sans-serif">Fallback image is active</text>
  <text x="24" y="84" fill="#9dd4ff" font-size="13" font-family="Segoe UI, Arial, sans-serif">Use your deployed endpoint for live values:</text>
  <text x="24" y="106" fill="#ffffff" font-size="12" font-family="Segoe UI, Arial, sans-serif">/api/contributions?username=YOUR_USERNAME</text>

  <g transform="translate(24,124)">
    <rect x="0" y="0" width="14" height="14" rx="2" fill="#0d1117"/>
    <rect x="18" y="0" width="14" height="14" rx="2" fill="#0e3d1a"/>
    <rect x="36" y="0" width="14" height="14" rx="2" fill="#1d6d2a"/>
    <rect x="54" y="0" width="14" height="14" rx="2" fill="#27a82f"/>
    <rect x="72" y="0" width="14" height="14" rx="2" fill="#3aed5d"/>
    <text x="96" y="11" fill="#ffffff" font-size="12" font-family="Segoe UI, Arial, sans-serif">Low to high contribution intensity</text>
  </g>
</svg>
